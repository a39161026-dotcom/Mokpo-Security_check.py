<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>보안 스캐너</title>
    <style>
        body { font-family: 맑은 고딕; background: #0D1B2A; color: white; text-align: center; padding: 50px; }
        h1 { color: #0A9396; font-size: 2.5em; }
        p { color: #94D2BD; }
        .upload-box { background: #132238; padding: 30px; border-radius: 10px; display: inline-block; margin-top: 30px; min-width: 400px; }
        label { display: block; color: #94D2BD; margin-bottom: 5px; text-align: left; }
        input[type="password"], input[type="file"] { width: 100%; padding: 8px; margin-bottom: 15px; background: #1B2838; border: 1px solid #0A9396; border-radius: 5px; color: white; box-sizing: border-box; }
        button { background: #0A9396; color: white; border: none; padding: 10px 30px; border-radius: 5px; cursor: pointer; font-size: 1em; width: 100%; }
        button:hover { background: #094d4f; }
        .result { margin-top: 30px; padding: 20px; border-radius: 10px; display: inline-block; min-width: 400px; }
        .safe { background: #1A3D2B; border: 1px solid #0A9396; }
        .danger { background: #3D1A1A; border: 1px solid #ff4444; }
        .filename { font-size: 1.2em; font-weight: bold; }
        .status { font-size: 1.5em; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🔐 파일 보안 스캐너</h1>
    <p>VirusTotal API 기반 실시간 악성코드 탐지 시스템</p>

    <div class="upload-box">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <label>🔑 VirusTotal API 키</label>
            {{ form.api_key }}
            <label>📁 파일 선택</label>
            {{ form.file }}
            <button type="submit">🔍 스캔 시작</button>
        </form>
    </div>

    {% if result %}
    <div class="result {% if result.is_safe %}safe{% else %}danger{% endif %}">
        <div class="filename">📄 {{ result.filename }}</div>
        <div class="status">{{ result.status }}</div>
    </div>
    {% endif %}

</body>
</html>
