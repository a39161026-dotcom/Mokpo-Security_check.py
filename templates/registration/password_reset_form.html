<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 찾기 - 보안 스캐너</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 맑은 고딕; background: #0D1B2A; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: #132238; padding: 40px; border-radius: 12px; width: 400px; border: 1px solid #1E3A4A; }
        h1 { color: #0A9396; text-align: center; margin-bottom: 10px; font-size: 1.8em; }
        p { color: #94D2BD; text-align: center; margin-bottom: 25px; font-size: 0.9em; }
        label { display: block; color: #94D2BD; margin-bottom: 6px; font-size: 0.9em; }
        input[type="email"] { width: 100%; padding: 10px; margin-bottom: 20px; background: #1B2838; border: 1px solid #0A9396; border-radius: 6px; color: white; font-size: 0.95em; }
        .btn { width: 100%; padding: 12px; background: #0A9396; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; font-weight: bold; }
        .btn:hover { background: #077a7d; }
        .back-link { text-align: center; margin-top: 20px; color: #94D2BD; font-size: 0.9em; }
        .back-link a { color: #0A9396; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔐 비밀번호 찾기</h1>
        <p>가입한 이메일 주소를 입력하면 재설정 링크를 보내드려요.</p>
        <form method="post">
            {% csrf_token %}
            <label>이메일 주소</label>
            <input type="email" name="email" placeholder="이메일을 입력하세요" autofocus>
            <button type="submit" class="btn">✉️ 재설정 링크 보내기</button>
        </form>
        <div class="back-link">
            <a href="/accounts/login/">← 로그인으로 돌아가기</a>
        </div>
    </div>
</body>
</html>
