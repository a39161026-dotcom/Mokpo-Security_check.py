<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - 보안 스캐너</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 맑은 고딕; background: #0D1B2A; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .register-box { background: #132238; padding: 40px; border-radius: 12px; width: 400px; border: 1px solid #1E3A4A; }
        h1 { color: #0A9396; text-align: center; margin-bottom: 30px; font-size: 1.8em; }
        label { display: block; color: #94D2BD; margin-bottom: 6px; font-size: 0.9em; }
        input[type="text"], input[type="password"], input[type="email"] { width: 100%; padding: 10px; margin-bottom: 15px; background: #1B2838; border: 1px solid #0A9396; border-radius: 6px; color: white; font-size: 0.95em; }
        .btn { width: 100%; padding: 12px; background: #0A9396; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; font-weight: bold; }
        .btn:hover { background: #077a7d; }
        .error { background: #3D1A1A; border: 1px solid #ff4444; padding: 10px; border-radius: 6px; margin-bottom: 15px; color: #ff6b6b; font-size: 0.9em; }
        .login-link { text-align: center; margin-top: 20px; color: #94D2BD; font-size: 0.9em; }
        .login-link a { color: #0A9396; text-decoration: none; }
        .help-text { color: #666; font-size: 0.8em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="register-box">
        <h1>🔐 회원가입</h1>
        <form method="post">
            {% csrf_token %}
            {% if form.errors %}
            <div class="error">
                {% for field in form %}
                    {% for error in field.errors %}{{ error }}{% endfor %}
                {% endfor %}
            </div>
            {% endif %}
            {% for field in form %}
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}
            <p class="help-text">{{ field.help_text }}</p>
            {% endif %}
            {% endfor %}
            <button type="submit" class="btn">✅ 가입하기</button>
        </form>
        <div class="login-link">
            이미 계정이 있나요? <a href="/accounts/login/">로그인</a>
        </div>
    </div>
</body>
</html>
