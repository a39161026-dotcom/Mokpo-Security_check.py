<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이메일 발송 완료 - 보안 스캐너</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 맑은 고딕; background: #0D1B2A; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: #132238; padding: 40px; border-radius: 12px; width: 400px; border: 1px solid #1E3A4A; text-align: center; }
        h1 { color: #0A9396; margin-bottom: 20px; font-size: 1.8em; }
        p { color: #94D2BD; margin-bottom: 30px; line-height: 1.6; }
        .btn { display: block; padding: 12px; background: #0A9396; color: white; border-radius: 6px; text-decoration: none; font-weight: bold; }
        .btn:hover { background: #077a7d; }
    </style>
</head>
<body>
    <div class="box">
        <h1>✉️ 이메일 발송 완료!</h1>
        <p>입력한 이메일로 비밀번호 재설정 링크를 보냈어요. 메일함을 확인해주세요!</p>
        <a href="/accounts/login/" class="btn">로그인으로 돌아가기</a>
    </div>
</body>
</html>
